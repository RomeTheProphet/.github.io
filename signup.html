<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Top Tier Trade</title>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .box {
            margin-top: 100px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>

    <input type="text" placeholder="Username">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="alert('Account created (demo only)')">Sign Up</button>
</div>

</body>
</html>
